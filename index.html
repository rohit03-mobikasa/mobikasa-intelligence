<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mobikasa — Stores</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="topbar">
      <div>
        <h1>Stores</h1>
        <p class="subtitle" style="margin-bottom: 0;">All merchants in the Mobikasa Intelligence pipeline.</p>
      </div>
      <a href="/add-store" class="btn">+ Add New Store</a>
    </div>

    <ul class="store-list" id="storeList"></ul>
    <div class="empty-state" id="emptyState" style="display: none;">
      No stores yet. Click "Add New Store" to get started.
    </div>
  </div>
</div>

<script>
  async function loadStores() {
    const res = await fetch("/api/stores");
    if (res.status === 401) {
      window.location.href = "/login";
      return;
    }
    const json = await res.json();
    const list = document.getElementById("storeList");
    const empty = document.getElementById("emptyState");

    if (!json.stores || json.stores.length === 0) {
      empty.style.display = "block";
      return;
    }

    json.stores.forEach((store) => {
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.className = "store-row";
      a.href = "/store?id=" + encodeURIComponent(store.merchant_id);
      a.innerHTML = `
        <div>
          <div class="store-name">${escapeHtml(store.store_name)}</div>
          <div class="store-url">${escapeHtml(store.shopify_url)}</div>
        </div>
        <span class="status-badge">${escapeHtml(store.status)}</span>
      `;
      li.appendChild(a);
      list.appendChild(li);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  loadStores();
</script>
</body>
</html>
